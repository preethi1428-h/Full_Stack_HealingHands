<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Counselor Login</title>
  <link rel="stylesheet" href="../style.css/counselor_login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <h2 class="logo">HEALING HANDS</h2>
    <div class="nav-links">
      <a href="./login.html">User Login</a>
    </div>
  </div>

  <!-- Login Card -->
  <div class="container">
    <div class="card">
      <h2>Counselor Login</h2>

      <form id="loginForm">

        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required>
          <i class="fas fa-eye eye-icon" id="togglePassword"></i>
        </div>

        <span id="errorMsg" style="color:red;"></span>

        <button type="submit">Login</button>
      </form>

      <p class="register-text">
        Don't have an account?
        <a href="../Assesment/counselor_register.html">Register here</a>
      </p>

    </div>
  </div>


<script>

// 🔐 Password Toggle
const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");

togglePassword.addEventListener("click", function () {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    togglePassword.classList.remove("fa-eye");
    togglePassword.classList.add("fa-eye-slash");
  } else {
    passwordInput.type = "password";
    togglePassword.classList.remove("fa-eye-slash");
    togglePassword.classList.add("fa-eye");
  }
});


// 🔥 Backend Connected Login
const loginForm = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");

loginForm.addEventListener("submit", function (e) {

  e.preventDefault();

  let email = document.getElementById("email").value.trim();
  let password = passwordInput.value.trim();

  errorMsg.innerText = "";

  if (email === "") {
    errorMsg.innerText = "Email is required";
    return;
  }

  if (password.length < 8) {
    errorMsg.innerText = "Password must be at least 8 characters";
    return;
  }

  fetch("https://full-stack-backend-yuzh.onrender.com/provider/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email,
      password: password
    })
  })
  .then(res => {
    if (!res.ok) {
      throw new Error("Invalid credentials");
    }
    return res.json();
  })
  .then(data => {

    // Store session
    localStorage.setItem("provider_id", data.id);
    localStorage.setItem("provider_name", data.name);

    alert("Login Successful ");

    // Redirect (relative path correct)
    window.location.href = "./dashboard.html";

  })
  .catch(err => {
    errorMsg.innerText = "Invalid Email or Password";
    console.error(err);
  });

});

</script>

</body>
</html>
